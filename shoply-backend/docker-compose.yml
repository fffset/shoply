version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: shoply_postgres
    environment:
      POSTGRES_USER: shoply_user
      POSTGRES_PASSWORD: shoply_password
      POSTGRES_DB: shoply_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoply_user -d shoply_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
